name: 🚀 Build y empaquetado para Conexcol

on:
  push:
    branches:
      - main

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obteniendo código
        uses: actions/checkout@v4

      - name: 🏗️ Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalando dependencias
        run: npm install

      - name: 🏗️ Construyendo aplicación (Build)
        run: npm run build
        env:
          BUILD_MODE: true

      - name: 📂 Preparando archivos para cPanel
        run: |
          mkdir -p deploy_package/app
          # Standalone autocontenido en app/ (su node_modules no esta en la raiz)
          cp -rL .next/standalone/. deploy_package/app/
          cp -r public/. deploy_package/app/public/
          cp -r .next/static deploy_package/app/.next/static
          # Startup file en la raiz (sin dependencias propias)
          cp server.cjs deploy_package/
          # package.json minimal para CloudLinux (sin dependencias)
          echo '{"name":"klicus","version":"0.1.0","private":true}' > deploy_package/package.json

      - name: 🗜️ Comprimir paquete
        run: cd deploy_package && zip -r ../deploy.zip .

      - name: 📎 Subir deploy.zip como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.zip
          retention-days: 7
