name: 🚀 Despliegue Automático a Conexcol

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obteniendo código
        uses: actions/checkout@v4

      - name: 🏗️ Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalando dependencias
        run: npm install

      - name: 🏗️ Construyendo aplicación (Build)
        run: npm run build
        env:
          BUILD_MODE: true

      - name: 📂 Preparando archivos para cPanel
        run: |
          mkdir deploy_package
          cp -r .next deploy_package/
          rm -rf deploy_package/.next/cache
          cp -r public deploy_package/
          cp package.json deploy_package/
          cp package-lock.json deploy_package/
          cp next.config.js deploy_package/
          cp server.cjs deploy_package/

      - name: 🗜️ Comprimir paquete en un solo archivo
        run: tar -czf deploy.tar.gz -C deploy_package .

      - name: 📤 Subir a servidor vía SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "deploy.tar.gz"
          target: "~/"

      - name: 🔄 Extraer e instalar en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            tar -xzf ~/deploy.tar.gz -C ~/klicus_prod
            rm ~/deploy.tar.gz
            cloudlinux-selector install-modules \
              --json --interpreter nodejs \
              --user "$USER" \
              --app-root "$HOME/klicus_prod" \
              2>/dev/null || true
            cloudlinux-selector restart \
              --json --interpreter nodejs \
              --user "$USER" \
              --app-root "$HOME/klicus_prod" \
              2>/dev/null || true
