name: 🚀 Despliegue Automático a Conexcol

on:
  push:
    branches:
      - main  # Se dispara cuando haces push a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obteniendo código
        uses: actions/checkout@v4

      - name: 🏗️ Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalando dependencias
        run: npm install

      - name: 🏗️ Construyendo aplicación (Build)
        run: npm run build
        env:
          NEXT_PRIVATE_STANDALONE: true

      - name: 📂 Preparando archivos para cPanel
        run: |
          mkdir deploy_package
          cp -rL .next/standalone/* deploy_package/
          # Patch: Comment out the line that causes 'Cannot find module next'
          # This line is often redundant in standalone mode and causes issues on shared hosts
          sed -i "s/require('next')/\/\/ require('next')/g" deploy_package/server.js
          
          cp -r public deploy_package/
          mkdir -p deploy_package/.next/static
          cp -r .next/static/* deploy_package/.next/static/

      - name: 🚀 Subiendo a Conexcol vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./deploy_package/
          server-dir: ./klicus_prod/ # Carpeta que coincide con tu App Root en cPanel
          state-name: .ftp-deploy-sync-state.json
