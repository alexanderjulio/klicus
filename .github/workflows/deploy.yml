name: 🚀 Despliegue Automático a Conexcol

on:
  push:
    branches:
      - main  # Se dispara cuando haces push a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obteniendo código
        uses: actions/checkout@v4

      - name: 🏗️ Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalando dependencias
        run: npm install

      - name: 🏗️ Construyendo aplicación (Build)
        run: npm run build
        env:
          BUILD_MODE: true

      - name: 📂 Preparando archivos para cPanel
        run: |
          mkdir deploy_package
          cp -r .next deploy_package/
          rm -rf deploy_package/.next/cache
          cp -r public deploy_package/
          cp package.json deploy_package/
          cp package-lock.json deploy_package/
          cp next.config.js deploy_package/
          cp server.cjs deploy_package/

      - name: 🚀 Subiendo a Conexcol vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./deploy_package/
          server-dir: ./klicus_prod/
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
