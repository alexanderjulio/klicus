name: klicus_mobile
description: "KLICUS Marketplace - Official Mobile Application"
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.1
  
  # Persistence
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4

  # UI & Aesthetics
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0
  flutter_staggered_animations: ^1.0.0
  fl_chart: ^0.66.0

  # Global State & Logic
  provider: ^6.1.1

  # Native Features
  image_picker: ^1.0.7
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  flutter_image_compress: ^2.2.0
  path_provider: ^2.1.2
  http: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Cache & Real-time
  flutter_cache_manager: ^3.3.1
  web_socket_channel: ^2.4.0

  # Firebase & Notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.4
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/

dependency_overrides:
  geolocator_android: 4.6.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  web:
    generate: true
    image_path: "assets/icon.png"

flutter_native_splash:
  color: "#E0E000"
  image: "assets/splash_padded.png"
  android_12:
    color: "#E0E000"
    image: "assets/splash_padded.png"
